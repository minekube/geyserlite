# Cross-play stack: geyserlite (Bedrock) + Paper (Java backend).
#
# Usage:
#   docker compose up
# Then connect:
#   - Java edition: localhost:25565
#   - Bedrock edition: localhost:19132 (any version Geyser supports)
#
# The Floodgate key is generated by an init-container on first run if
# floodgate-key/key.bin doesn't yet exist.

services:
  floodgate-key:
    image: alpine:3.20
    command: >
      sh -c "test -f /key/key.bin || (head -c 16 /dev/urandom > /key/key.bin && chmod 600 /key/key.bin && echo 'generated 16-byte AES Floodgate key')"
    volumes:
      - floodgate-key:/key

  geyserlite:
    image: ghcr.io/minekube/geyserlite:latest
    restart: unless-stopped
    depends_on:
      floodgate-key:
        condition: service_completed_successfully
      paper:
        condition: service_started
    ports:
      - "19132:19132/udp"
    volumes:
      - ./config.yml:/config.yml:ro
      - floodgate-key:/data:ro

  paper:
    image: itzg/minecraft-server:latest
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.11"
      ONLINE_MODE: "FALSE"
      ENFORCE_SECURE_PROFILE: "FALSE"
      MEMORY: "1G"
    volumes:
      - paper-data:/data
    ports:
      - "25565:25565"

volumes:
  floodgate-key:
  paper-data:
