name: Integration setup
description: |
  Common scaffolding for the four embed/subprocess integration jobs in
  native-image.yml — mise + download the geyserlite-amd64 artifact +
  start the upstream stub. Each job still does its own actions/checkout
  before this (so the composite action itself is reachable on disk).

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@v4
      with:
        cache: true
        experimental: true

    - uses: actions/download-artifact@v4
      with:
        name: geyserlite-amd64
        path: /tmp/artifacts

    - name: chmod the ELF (a no-op for embed jobs that don't use it)
      shell: bash
      run: chmod +x /tmp/artifacts/geyserlite-linux-amd64 || true

    - name: Start upstream stub (TCP 25565 swallow-everything)
      shell: bash
      run: |
        # setsid puts the stub in its own session so it survives the
        # composite action's shell exit. The integration test is the
        # only thing that needs port 25565 (Geyser's upstream), and
        # nothing in the runner else binds it; per-job EXIT traps
        # only need to clean up the integration test process group.
        setsid bash -c 'while true; do nc -l -p 25565 < /dev/null > /dev/null 2>&1 || true; done' \
          < /dev/null > /dev/null 2>&1 &
        disown
