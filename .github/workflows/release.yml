        run: echo "TODO"

      - name: TODO publish Rust crate
        run: echo "TODO"
        # cd rust && cargo publish --token "${{ secrets.CRATES_IO_TOKEN }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
