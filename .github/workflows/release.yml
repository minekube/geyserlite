name: Release

on:
  push:
    tags:
      - 'v*'
  # release-please-action's bot pushes the tag with GITHUB_TOKEN,
  # which doesn't fire downstream workflows. release-please.yml's
  # trigger-release job invokes this workflow via workflow_dispatch
  # on the tag ref to close that loop without needing a PAT.
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish or repair. Empty uses the workflow ref.
        required: false
        type: string
      skip_crates_publish:
        description: Skip crates.io publish when repairing an existing GitHub Release.
        required: false
        default: false
        type: boolean

permissions:
  contents: write    # GitHub Release upload
  packages: write    # GHCR (if we ever sign the OCI image at release time)
  id-token: write    # cosign keyless + crates.io Trusted Publishing OIDC
  actions: read      # locate and download matching native-image artifacts

jobs:
  release:
    runs-on: ubuntu-latest
    # crates.io's Trusted Publisher binds to a (repository, workflow,
    # environment) triple. Naming the env "release" + matching it on the
    # crates.io side prevents tag-pushers from publishing if they're
    # somehow able to bypass branch protection on this workflow.
    environment: release

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: jdx/mise-action@v4
        with:
          cache: true
          experimental: true

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Pull native artifacts for this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p artifacts

          # Release commits usually only bump metadata. The native assets
          # belong to the latest reachable commit that changed native build
          # inputs, so wait for that exact native-image.yml run instead of
          # racing against "latest successful" artifacts from an older commit.
          NATIVE_SHA=$(git log -n 1 --format=%H -- \
            build \
            mise.toml \
            .github/workflows/native-image.yml)

          if [ -z "$NATIVE_SHA" ]; then
            echo "::error::Could not resolve native artifact source commit"
            exit 1
          fi

          echo "Waiting for native-image.yml artifacts from $NATIVE_SHA"
          RUN_ID=""
          RUN_URL=""
          for _ in $(seq 1 240); do
            RUN_JSON=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow=native-image.yml \
              --branch=main \
              --limit=100 \
              --json databaseId,headSha,status,conclusion,url,createdAt \
              --jq "map(select(.headSha == \"$NATIVE_SHA\")) | sort_by(.createdAt) | reverse | .[0] // {}")

            RUN_ID=$(echo "$RUN_JSON" | jq -r '.databaseId // ""')
            STATUS=$(echo "$RUN_JSON" | jq -r '.status // ""')
            CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion // ""')
            RUN_URL=$(echo "$RUN_JSON" | jq -r '.url // ""')

            if [ -z "$RUN_ID" ]; then
              echo "No native-image.yml run for $NATIVE_SHA yet; waiting..."
              sleep 10
              continue
            fi

            echo "native-image.yml run $RUN_ID is $STATUS/$CONCLUSION: $RUN_URL"
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                break
              fi
              echo "::error::native-image.yml run $RUN_ID concluded $CONCLUSION"
              exit 1
            fi

            sleep 10
          done

          if [ -z "$RUN_ID" ] || [ "$STATUS" != "completed" ] || [ "$CONCLUSION" != "success" ]; then
            echo "::error::Timed out waiting for successful native-image.yml artifacts from $NATIVE_SHA"
            exit 1
          fi

          # Only download our own upload-artifact outputs; skip the
          # docker/build-push-action build-summary blobs (which gh run
          # download mistakes for zips and chokes on).
          gh run download "$RUN_ID" --dir artifacts --pattern 'geyserlite-*'
          ls -la artifacts/

      - name: Generate checksums.txt
        # The auto-download path in go/ and rust/ resolves asset SHAs
        # against this file at <download-base>/<tag>/checksums.txt.
        # Format: "<sha256>  <filename>" — one per line, sha256sum-compatible.
        run: |
          ( cd artifacts
            shopt -s globstar nullglob
            for f in **/*; do
              [ -f "$f" ] || continue
              # Strip the upload-artifact subdir prefix so the file name
              # in checksums.txt matches the released asset name.
              base="$(basename "$f")"
              case "$base" in *.sig|*.attest.spdx.json|checksums.txt) continue;; esac
              sha256sum "$f" | awk -v b="$base" '{ print $1 "  " b }'
            done | sort -k2 > /tmp/checksums.txt
          )
          mv /tmp/checksums.txt artifacts/checksums.txt
          cat artifacts/checksums.txt

      - name: cosign sign release artifacts
        run: |
          for f in artifacts/**/*; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --bundle "${f}.sigstore.json" "$f"
          done

      - name: Generate SBOM attestations
        run: |
          for f in artifacts/**/*.so artifacts/**/geyserlite-*; do
            [ -f "$f" ] || continue
            cosign attest-blob --yes --predicate <(echo "{}") --type spdx --output-attestation "${f}.attest.spdx.json" "$f" || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*

      # crates.io Trusted Publishing — no CARGO_REGISTRY_TOKEN secret needed.
      # See https://crates.io/docs/trusted-publishing
      # First-time setup: publish v0.0.0 manually with a temporary token,
      # then on crates.io go to "Settings → Trusted Publishing" for the
      # `geyserlite` crate and add a GitHub publisher with:
      #   repository:    minekube/geyserlite
      #   workflow file: release.yml
      #   environment:   release
      - name: Get a short-lived crates.io token via OIDC
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_crates_publish }}
        id: cargo-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish Rust crate
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_crates_publish }}
        # --allow-dirty: release-please bumps Cargo.toml but its TOML
        # jsonpath updater can't cleanly target the geyserlite entry in
        # Cargo.lock (filtered jsonpath isn't supported), so the lockfile
        # may be one version behind. cargo publish would auto-update the
        # lockfile and then refuse to ship because the working dir is
        # dirty. The actual published crate uses Cargo.toml's version,
        # which is correct, so dirty-lock is safe to skip.
        run: cargo publish --manifest-path rust/Cargo.toml --no-verify --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cargo-auth.outputs.token }}

  dispatch-gate-bump:
    needs: release
    if: startsWith(inputs.release_tag || github.ref_name, 'v')
    uses: minekube/actions/.github/workflows/dispatch-workflow.yml@1965ed6ae602a602f9f98edcb31fe177403e8d77
    permissions:
      contents: read
      id-token: write
    with:
      target-repository: gate
      target-workflow: bump-managed-dependency.yml
      target-ref: master
      inputs-json: |
        {
          "dependency": "geyserlite",
          "version": "${{ inputs.release_tag || github.ref_name }}",
          "source_repository": "${{ github.repository }}",
          "source_release_url": "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.release_tag || github.ref_name }}"
        }
    secrets: inherit
