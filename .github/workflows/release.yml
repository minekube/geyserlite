name: Release

on:
  push:
    tags:
      - 'v*'
  # release-please-action's bot pushes the tag with GITHUB_TOKEN,
  # which doesn't fire downstream workflows. release-please.yml's
  # trigger-release job invokes this workflow via workflow_dispatch
  # on the tag ref to close that loop without needing a PAT.
  workflow_dispatch:

permissions:
  contents: write    # GitHub Release upload
  packages: write    # GHCR (if we ever sign the OCI image at release time)
  id-token: write    # cosign keyless + crates.io Trusted Publishing OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    # crates.io's Trusted Publisher binds to a (repository, workflow,
    # environment) triple. Naming the env "release" + matching it on the
    # crates.io side prevents tag-pushers from publishing if they're
    # somehow able to bypass branch protection on this workflow.
    environment: release

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2
        with:
          cache: true
          experimental: true

      - uses: sigstore/cosign-installer@v3

      - name: Pull native artifacts from latest native-image.yml run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          # Last successful native-image build on this commit's history.
          RUN_ID=$(gh run list --workflow=native-image.yml --branch=main --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          # Only download our own upload-artifact outputs; skip the
          # docker/build-push-action build-summary blobs (which gh run
          # download mistakes for zips and chokes on).
          gh run download "$RUN_ID" --dir artifacts --pattern 'geyserlite-*'
          ls -la artifacts/

      - name: Generate checksums.txt
        # The auto-download path in go/ and rust/ resolves asset SHAs
        # against this file at <download-base>/<tag>/checksums.txt.
        # Format: "<sha256>  <filename>" — one per line, sha256sum-compatible.
        run: |
          ( cd artifacts
            shopt -s globstar nullglob
            for f in **/*; do
              [ -f "$f" ] || continue
              # Strip the upload-artifact subdir prefix so the file name
              # in checksums.txt matches the released asset name.
              base="$(basename "$f")"
              case "$base" in *.sig|*.attest.spdx.json|checksums.txt) continue;; esac
              sha256sum "$f" | awk -v b="$base" '{ print $1 "  " b }'
            done | sort -k2 > /tmp/checksums.txt
          )
          mv /tmp/checksums.txt artifacts/checksums.txt
          cat artifacts/checksums.txt

      - name: cosign sign release artifacts
        run: |
          for f in artifacts/**/*; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --output-signature "${f}.sig" "$f"
          done

      - name: Generate SBOM attestations
        run: |
          for f in artifacts/**/*.so artifacts/**/geyserlite-*; do
            [ -f "$f" ] || continue
            cosign attest-blob --yes --predicate <(echo "{}") --type spdx --output-attestation "${f}.attest.spdx.json" "$f" || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*

      # crates.io Trusted Publishing — no CARGO_REGISTRY_TOKEN secret needed.
      # See https://crates.io/docs/trusted-publishing
      # First-time setup: publish v0.0.0 manually with a temporary token,
      # then on crates.io go to "Settings → Trusted Publishing" for the
      # `geyserlite` crate and add a GitHub publisher with:
      #   repository:    minekube/geyserlite
      #   workflow file: release.yml
      #   environment:   release
      - name: Get a short-lived crates.io token via OIDC
        id: cargo-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish Rust crate
        # --allow-dirty: release-please bumps Cargo.toml but its TOML
        # jsonpath updater can't cleanly target the geyserlite entry in
        # Cargo.lock (filtered jsonpath isn't supported), so the lockfile
        # may be one version behind. cargo publish would auto-update the
        # lockfile and then refuse to ship because the working dir is
        # dirty. The actual published crate uses Cargo.toml's version,
        # which is correct, so dirty-lock is safe to skip.
        run: cargo publish --manifest-path rust/Cargo.toml --no-verify --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cargo-auth.outputs.token }}
