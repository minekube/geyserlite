name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write   # cosign keyless signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2
        with:
          cache: true
          experimental: true

      - uses: sigstore/cosign-installer@v3

      - name: Pull native artifacts from latest native-image.yml run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          # Last successful native-image build on this commit's history.
          RUN_ID=$(gh run list --workflow=native-image.yml --branch=main --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          gh run download "$RUN_ID" --dir artifacts
          ls -la artifacts/

      - name: cosign sign release artifacts
        run: |
          for f in artifacts/**/*; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --output-signature "${f}.sig" "$f"
          done

      - name: Generate SBOM
        run: |
          for f in artifacts/**/*.so artifacts/**/geyserlite-*; do
            [ -f "$f" ] || continue
            cosign attest-blob --yes --predicate <(echo "{}") --type spdx --output-attestation "${f}.attest.spdx.json" "$f" || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*

      - name: Publish Rust crate
        if: secrets.CRATES_IO_TOKEN != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cd rust
          cargo publish --no-verify
