name: CI

# Local and CI run the same `task` targets so they can't diverge.
# All tool versions come from mise.toml; mise-action installs them with caching.

# Path filters: lint+test only runs when something it actually checks
# changes. Doc-only or workflow-config edits skip CI. The native-image
# workflow has its own filter for build/**.
on:
  push:
    branches: [main]
    paths:
      - 'go/**'
      - 'rust/**'
      - 'examples/**'
      - 'mise.toml'
      - 'Taskfile.yml'
      - '.golangci.yml'
      - '.markdownlint*'
      - '.yamllint*'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'go/**'
      - 'rust/**'
      - 'examples/**'
      - 'mise.toml'
      - 'Taskfile.yml'
      - '.golangci.yml'
      - '.markdownlint*'
      - '.yamllint*'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dev tools (Go, Rust, Java/GraalVM, task, linters) via mise
        uses: jdx/mise-action@v4
        with:
          cache: true       # caches mise's tool installs
          experimental: true

      - name: Cache Go module + build cache, Cargo target
        uses: actions/cache@v5
        with:
          path: |
            .cache/go
            .cache/cargo-target
            ~/.cargo/registry
            ~/.cargo/git
          key: dev-${{ runner.os }}-${{ hashFiles('go/go.sum', 'rust/Cargo.lock', 'mise.toml') }}
          restore-keys: |
            dev-${{ runner.os }}-

      # mise's rust backend installs the toolchain but not its optional
      # components — rustfmt and clippy aren't implied by `rust = "1.85"`
      # in mise.toml. Add them explicitly via rustup before running lint.
      - name: Add rustup components (rustfmt, clippy)
        run: rustup component add rustfmt clippy

      - name: Setup
        run: task setup

      - name: Lint
        run: task lint

      - name: Test
        run: task test
