name: Build native image

# The slow ~3-min GraalVM build. Only runs when build/** changes (typically
# Renovate bumping geyser.version or graalvm.version) or on manual dispatch.
# All other commits — Go/Rust changes, doc edits, examples — skip this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'build/**'
      - 'mise.toml'
      - '.github/workflows/native-image.yml'
  pull_request:
    paths:
      - 'build/**'
      - 'mise.toml'
      - '.github/workflows/native-image.yml'
  workflow_dispatch:

permissions:
  contents: write   # GH Release upload
  packages: write   # GHCR push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/geyserlite

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Install dev tools via mise
        uses: jdx/mise-action@v2
        with:
          cache: true
          experimental: true

      - name: Read pinned versions
        id: pins
        run: |
          REF=$(tr -d '[:space:]' < build/geyser.version)
          GRAALVM=$(tr -d '[:space:]' < build/graalvm.version)
          {
            echo "geyser_ref=$REF"
            echo "geyser_short=${REF:0:12}"
            echo "graalvm=$GRAALVM"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
        if: matrix.arch == 'arm64'

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          target: image
          platforms: linux/${{ matrix.arch }}
          build-args: |
            GRAALVM_IMAGE=${{ steps.pins.outputs.graalvm }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.pins.outputs.geyser_short }}-${{ matrix.arch }}
          cache-from: type=gha,scope=image-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=image-${{ matrix.arch }}

      - name: Build shared library (extract artifacts)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          target: shared
          platforms: linux/${{ matrix.arch }}
          build-args: |
            GRAALVM_IMAGE=${{ steps.pins.outputs.graalvm }}
          outputs: type=local,dest=out
          cache-from: type=gha,scope=shared-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=shared-${{ matrix.arch }}

      - name: Stage release artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p artifacts
          cp out/libgeyserlite.so artifacts/libgeyserlite-linux-${{ matrix.arch }}.so
          cp out/libgeyserlite.h  artifacts/libgeyserlite.h

          # Pull the ELF out of the image we just pushed.
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.pins.outputs.geyser_short }}-${{ matrix.arch }}
          ID=$(docker create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.pins.outputs.geyser_short }}-${{ matrix.arch }})
          docker cp "$ID:/geyserlite" artifacts/geyserlite-linux-${{ matrix.arch }}
          docker rm "$ID"

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: geyserlite-${{ matrix.arch }}
          path: artifacts/
          if-no-files-found: error

  # Multi-arch manifest + smoke
  publish-manifest:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compose multi-arch manifest
        run: |
          REF=$(tr -d '[:space:]' < build/geyser.version)
          SHORT="${REF:0:12}"
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT}-arm64

  smoke:
    needs: publish-manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - name: Start container
        run: |
          REF=$(tr -d '[:space:]' < build/geyser.version)
          SHORT="${REF:0:12}"
          docker run -d --name geyser -p 19132:19132/udp \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT}
      - name: Probe Bedrock listener (synthetic RakNet client)
        run: |
          # Wait up to 30s for boot + bind, then verify MOTD round-trips.
          go -C go run ./cmd/bedrock-probe -wait=30s 127.0.0.1:19132 || (docker logs geyser; exit 1)
      - name: Tear down
        if: always()
        run: docker rm -f geyser || true
