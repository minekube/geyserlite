name: Build native image

# The slow ~3-min GraalVM build. Only runs when build/** changes (typically
# Renovate bumping geyser.version or graalvm.version) or on manual dispatch.
# All other commits — Go/Rust changes, doc edits, examples — skip this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'build/**'
      - 'mise.toml'
      - '.github/workflows/native-image.yml'
  pull_request:
    paths:
      - 'build/**'
      - 'mise.toml'
      - '.github/workflows/native-image.yml'
  workflow_dispatch:

permissions:
  contents: write   # GH Release upload
  packages: write   # GHCR push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/geyserlite

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Native runners per arch — public repos get free linux/amd64
        # *and* linux/arm64 GitHub-hosted runners. QEMU emulation of
        # arm64 took >45 min and timed out; native arm64 finishes in
        # ~10 min like amd64.
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Install dev tools via mise
        uses: jdx/mise-action@v2
        with:
          cache: true
          experimental: true

      - name: Read pinned versions
        id: pins
        run: |
          REF=$(tr -d '[:space:]' < build/geyser.version)
          GRAALVM=$(tr -d '[:space:]' < build/graalvm.version)
          {
            echo "geyser_ref=$REF"
            echo "geyser_short=${REF:0:12}"
            echo "graalvm=$GRAALVM"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          target: image
          platforms: linux/${{ matrix.arch }}
          build-args: |
            GRAALVM_IMAGE=${{ steps.pins.outputs.graalvm }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.pins.outputs.geyser_short }}-${{ matrix.arch }}
          cache-from: type=gha,scope=image-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=image-${{ matrix.arch }}

      - name: Build shared library (extract artifacts)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          target: shared
          platforms: linux/${{ matrix.arch }}
          build-args: |
            GRAALVM_IMAGE=${{ steps.pins.outputs.graalvm }}
          outputs: type=local,dest=out
          cache-from: type=gha,scope=shared-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=shared-${{ matrix.arch }}

      - name: Stage release artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p artifacts
          cp out/libgeyserlite.so artifacts/libgeyserlite-linux-${{ matrix.arch }}.so
          cp out/libgeyserlite.h  artifacts/libgeyserlite.h

          # Pull the ELF out of the image we just pushed.
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.pins.outputs.geyser_short }}-${{ matrix.arch }}
          ID=$(docker create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.pins.outputs.geyser_short }}-${{ matrix.arch }})
          docker cp "$ID:/geyserlite" artifacts/geyserlite-linux-${{ matrix.arch }}
          docker rm "$ID"

      - name: Assert C-ABI exports are reachable
        if: github.event_name != 'pull_request'
        # When @CEntryPoint discovery silently regresses (e.g. mainClass
        # gets reset, the bridge class is renamed/removed, or the gradle
        # plugin changes its analysis-root behavior), the build still
        # succeeds — just with a stub libgeyserlite.so that exposes only
        # graal_isolate_*. The Dockerfile then falls back to copying
        # graal_isolate.h into the position of libgeyserlite.h, so the
        # release looks fine on the surface. This guard makes that
        # regression a hard CI failure instead.
        run: |
          set -eu
          h="artifacts/libgeyserlite.h"
          required="geyser_init geyser_run geyser_shutdown geyser_status geyser_create_isolate geyser_tear_down_isolate"
          missing=""
          for sym in $required; do
            if ! grep -qE "\b${sym}\b" "$h"; then
              missing="$missing $sym"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error file=$h::libgeyserlite.h is missing C-ABI exports:$missing"
            echo "::error::GeyserBridge's @CEntryPoint methods aren't reachable from the native-image analysis root."
            echo "::error::Check mainClass in build/overlay/geyserlite-native/build.gradle.kts."
            echo "--- header dump ---"
            cat "$h"
            exit 1
          fi
          echo "OK: all $(echo $required | wc -w) required exports declared in libgeyserlite.h"

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: geyserlite-${{ matrix.arch }}
          path: artifacts/
          if-no-files-found: error

  # Multi-arch manifest + smoke
  publish-manifest:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compose multi-arch manifest
        run: |
          REF=$(tr -d '[:space:]' < build/geyser.version)
          SHORT="${REF:0:12}"
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT}-arm64

  # End-to-end embed test: pull the just-built libgeyserlite-linux-amd64.so,
  # have the Go library load it via purego, and confirm the Bedrock UDP
  # listener actually binds. This is the test that catches "the .so was
  # built fine but our Go bindings can't actually use it" — a class of
  # regression neither unit tests nor the docker smoke test can see.
  #
  # continue-on-error stays on until the @CEntryPoint reachability fix
  # has landed and is proven; without it the .so exports only
  # graal_isolate_* and Go's library can't resolve geyser_init.
  go-integration:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
        with:
          cache: true
          experimental: true
      - uses: actions/download-artifact@v4
        with:
          name: geyserlite-amd64
          path: /tmp/artifacts
      - name: Run Go library against just-built .so
        env:
          GEYSERLITE_LIBRARY: /tmp/artifacts/libgeyserlite-linux-amd64.so
          # Stay off 19132 to avoid stomping anything else on the runner.
          LISTEN: 127.0.0.1:19133
        run: |
          ls -la /tmp/artifacts/
          # Tiny TCP stub on the upstream port so Geyser's connection
          # attempts log politely instead of crash-spinning.
          ( while true; do nc -l -p 25565 < /dev/null > /dev/null 2>&1 || true; done ) &
          STUB=$!
          # Bind probe: integration-test exits 0 once Geyser binds the UDP socket.
          ( cd go && go run ./cmd/integration-test -listen "$LISTEN" -timeout 60s ) &
          IT=$!
          # Race: bedrock-probe sends the RakNet ping, integration-test
          # sees the bind. Both must succeed.
          ( cd go && go run ./cmd/bedrock-probe -wait 60s "$LISTEN" ) || PROBE=$?
          wait $IT || IT_RC=$?
          kill $STUB 2>/dev/null || true
          if [ -n "${PROBE:-}" ]; then
            echo "::error::bedrock-probe failed (rc=$PROBE)"; exit "$PROBE"
          fi
          if [ -n "${IT_RC:-}" ]; then
            echo "::error::integration-test failed (rc=$IT_RC)"; exit "$IT_RC"
          fi

  # Mirror of go-integration for the Rust crate. Same gating semantics
  # (continue-on-error until @CEntryPoint reachability is proven).
  rust-integration:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
        with:
          cache: true
          experimental: true
      - uses: actions/download-artifact@v4
        with:
          name: geyserlite-amd64
          path: /tmp/artifacts
      - name: Run Rust crate against just-built .so
        env:
          GEYSERLITE_LIBRARY: /tmp/artifacts/libgeyserlite-linux-amd64.so
          LISTEN: 127.0.0.1:19134
        run: |
          ls -la /tmp/artifacts/
          ( while true; do nc -l -p 25565 < /dev/null > /dev/null 2>&1 || true; done ) &
          STUB=$!
          ( cd rust && cargo run --example integration_test -- --listen "$LISTEN" --timeout 60 ) &
          IT=$!
          ( cd go && go run ./cmd/bedrock-probe -wait 60s "$LISTEN" ) || PROBE=$?
          wait $IT || IT_RC=$?
          kill $STUB 2>/dev/null || true
          if [ -n "${PROBE:-}" ]; then
            echo "::error::bedrock-probe failed (rc=$PROBE)"; exit "$PROBE"
          fi
          if [ -n "${IT_RC:-}" ]; then
            echo "::error::integration-test failed (rc=$IT_RC)"; exit "$IT_RC"
          fi

  smoke:
    needs: publish-manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - name: Start container
        run: |
          REF=$(tr -d '[:space:]' < build/geyser.version)
          SHORT="${REF:0:12}"
          docker run -d --name geyser -p 19132:19132/udp \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT}
      - name: Probe Bedrock listener (synthetic RakNet client)
        run: |
          # Wait up to 30s for boot + bind, then verify MOTD round-trips.
          go -C go run ./cmd/bedrock-probe -wait=30s 127.0.0.1:19132 || (docker logs geyser; exit 1)
      - name: Tear down
        if: always()
        run: docker rm -f geyser || true
