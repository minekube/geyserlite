name: Build native image

# The slow ~3-min GraalVM build. Only runs when build/** changes (typically
# Renovate bumping geyser.version or graalvm.version) or on manual dispatch.
# All other commits — Go/Rust changes, doc edits, examples — skip this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'build/**'
      - 'mise.toml'
      - '.github/workflows/native-image.yml'
  pull_request:
    paths:
      - 'build/**'
      - 'mise.toml'
      - '.github/workflows/native-image.yml'
  workflow_dispatch:

permissions:
  contents: write   # GH Release upload
  packages: write   # GHCR push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/geyserlite

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Native runners per arch — public repos get free linux/amd64
        # *and* linux/arm64 GitHub-hosted runners. QEMU emulation of
        # arm64 took >45 min and timed out; native arm64 finishes in
        # ~10 min like amd64.
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install dev tools via mise
        uses: jdx/mise-action@v4
        with:
          cache: true
          experimental: true

      - name: Read pinned versions
        id: pins
        run: |
          REF=$(tr -d '[:space:]' < build/geyser.version)
          GRAALVM=$(tr -d '[:space:]' < build/graalvm.version)
          {
            echo "geyser_ref=$REF"
            echo "geyser_short=${REF:0:12}"
            echo "graalvm=$GRAALVM"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (and push on main)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          target: image
          platforms: linux/${{ matrix.arch }}
          build-args: |
            GRAALVM_IMAGE=${{ steps.pins.outputs.graalvm }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.pins.outputs.geyser_short }}-${{ matrix.arch }}
          cache-from: type=gha,scope=image-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=image-${{ matrix.arch }}

      - name: Smoke image on native architecture
        run: |
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.pins.outputs.geyser_short }}-${{ matrix.arch }}"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            docker pull "$image"
          fi
          docker run -d --name geyser-image-smoke "$image"
          trap 'docker logs geyser-image-smoke 2>&1 || true; docker rm -f geyser-image-smoke >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 60); do
            logs=$(docker logs geyser-image-smoke 2>&1)
            if grep -q "Started Geyser on UDP port" <<<"$logs"; then
              exit 0
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' geyser-image-smoke)" != "true" ]; then
              exit 1
            fi
            sleep 1
          done
          exit 1

      - name: Build shared library (extract artifacts)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          target: shared
          platforms: linux/${{ matrix.arch }}
          build-args: |
            GRAALVM_IMAGE=${{ steps.pins.outputs.graalvm }}
          outputs: type=local,dest=out
          cache-from: type=gha,scope=shared-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=shared-${{ matrix.arch }}

      - name: Stage release artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p artifacts
          cp out/libgeyserlite.so artifacts/libgeyserlite-linux-${{ matrix.arch }}.so
          cp out/libgeyserlite.h  artifacts/libgeyserlite.h

          # Pull the ELF out of the image we just pushed.
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.pins.outputs.geyser_short }}-${{ matrix.arch }}
          ID=$(docker create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.pins.outputs.geyser_short }}-${{ matrix.arch }})
          docker cp "$ID:/geyserlite" artifacts/geyserlite-linux-${{ matrix.arch }}
          docker rm "$ID"

      - name: Assert C-ABI exports are reachable
        if: github.event_name != 'pull_request'
        # When @CEntryPoint discovery silently regresses (e.g. the
        # GeyserBridgeFeature stops being registered, the bridge class
        # is renamed, or the analysis runs without our Feature on
        # classpath), the build still succeeds — just with a stub
        # libgeyserlite.so that exposes only graal_isolate_*. The
        # Dockerfile then falls back to copying graal_isolate.h into
        # the position of libgeyserlite.h, so the release looks fine
        # on the surface. This guard makes that regression hard.
        #
        # We assert two things:
        #   1. libgeyserlite.h declares the four geyser_* methods
        #      from GeyserBridge.java
        #   2. the .so actually exports both those + the standard
        #      graal_isolate runtime functions the host calls
        #      (graal_create_isolate / graal_tear_down_isolate)
        run: |
          set -eu
          h="artifacts/libgeyserlite.h"
          so="artifacts/libgeyserlite-linux-${{ matrix.arch }}.so"

          required_h="geyser_init geyser_run geyser_shutdown geyser_status"
          missing=""
          for sym in $required_h; do
            grep -qE "\b${sym}\b" "$h" || missing="$missing $sym"
          done
          if [ -n "$missing" ]; then
            echo "::error file=$h::libgeyserlite.h missing geyser_* declarations:$missing"
            echo "::error::Check GeyserBridgeFeature is on -H:Features in build.gradle.kts."
            cat "$h"
            exit 1
          fi

          required_so="geyser_init geyser_run geyser_shutdown geyser_status graal_create_isolate graal_tear_down_isolate"
          missing=""
          for sym in $required_so; do
            nm -D "$so" 2>/dev/null | grep -qE " T ${sym}\b" || missing="$missing $sym"
          done
          if [ -n "$missing" ]; then
            echo "::error file=$so::libgeyserlite.so missing exported symbols:$missing"
            exit 1
          fi
          echo "OK: header declares geyser_* set; .so exports geyser_* + graal_isolate runtime"

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: geyserlite-${{ matrix.arch }}
          path: artifacts/
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Smoke GraalVM Native Image toolchain
        shell: pwsh
        run: |
          $nativeImage = Join-Path $env:GRAALVM_HOME "bin/native-image.cmd"
          & $nativeImage --version
          javac -version
          cl.exe 2>&1 | Select-Object -First 1

          New-Item -ItemType Directory -Force build/.native-smoke | Out-Null
          Set-Content -Path build/.native-smoke/Hello.java -Value 'public class Hello { public static void main(String[] args) { System.out.println("hello"); } }'
          Push-Location build/.native-smoke
          javac Hello.java
          & $nativeImage --no-fallback -O0 Hello
          .\hello.exe
          Pop-Location

      - name: Apply Geyser overlay
        shell: bash
        env:
          PYTHON: python
        run: |
          python --version
          bash build/apply-overlay.sh

      - name: Build standalone shadow JAR
        working-directory: build/.work/Geyser
        run: ./gradlew.bat :standalone:shadowJar --no-daemon

      - name: Complete native-image metadata
        shell: pwsh
        run: |
          python build/augment-annotation-reflect-config.py `
            --jar build/.work/Geyser/bootstrap/standalone/build/libs/Geyser-Standalone.jar `
            --config-dir build/.work/Geyser/agent-config
          python build/mark-reflect-unsafe.py `
            --config-dir build/.work/Geyser/agent-config

      - name: Build Windows executable
        shell: pwsh
        env:
          NI_BUILD_JVM_XMX: 6g
        run: |
          New-Item -ItemType Directory -Force build/.native-windows | Out-Null
          Copy-Item build/.work/Geyser/bootstrap/standalone/build/libs/Geyser-Standalone.jar build/.native-windows/
          Copy-Item -Recurse build/.work/Geyser/agent-config build/.native-windows/
          Set-Location build/.native-windows

          $nativeImage = Join-Path $env:GRAALVM_HOME "bin/native-image.cmd"
          & $nativeImage --version
          cl.exe 2>&1 | Select-Object -First 1
          Remove-Item Env:NATIVE_IMAGE_CONFIG_FILE -ErrorAction SilentlyContinue

          $jar = "Geyser-Standalone.jar"
          $configDir = "agent-config"
          $output = "geyserlite"
          Write-Host "native-image jar: $jar"
          Write-Host "native-image config: $configDir"
          Write-Host "native-image output: $output"

          $buildXmx = if ($env:NI_BUILD_JVM_XMX) { $env:NI_BUILD_JVM_XMX } else { "6g" }
          $flags = @(
            "-H:ConfigurationFileDirectories=$configDir",
            '-H:IncludeResources=^(custom-skulls\.yml|permissions\.yml|.+\.json|.+\.properties|.+\.lang|.+\.dat|META-INF/services/.+|languages/.+|mappings/.+|bedrock/.+|assets/.+|.+\.mcpack)$',
            "--no-fallback",
            "--enable-url-protocols=https,http",
            "--initialize-at-build-time=org.apache.logging.log4j,net.minecrell.terminalconsoleappender,org.jline,org.fusesource.jansi,org.yaml.snakeyaml,java.awt.Color,com.sun.jna",
            "--initialize-at-run-time=sun.awt.HeadlessToolkit,sun.awt.SunHints",
            "--strict-image-heap",
            "-march=compatibility",
            "-O2",
            "-R:MaxHeapSize=256m",
            "-H:+UnlockExperimentalVMOptions",
            "-H:+RemoveSaturatedTypeFlows",
            "-H:-ReportExceptionStackTraces",
            "-J-Xmx$buildXmx",
            "-jar", $jar,
            "--parallelism=2",
            "-o", $output
          )
          $argsFile = "native-image.args"
          Set-Content -Path $argsFile -Value $flags -Encoding utf8NoBOM
          Write-Host "native-image args:"
          Get-Content $argsFile | ForEach-Object { Write-Host "  $_" }

          & $nativeImage --dry-run "@$argsFile"
          & $nativeImage "@$argsFile"

      - name: Scan Windows executable with Microsoft Defender
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles\Windows Defender\MpCmdRun.exe"
          )
          if (Test-Path "$env:ProgramData\Microsoft\Windows Defender\Platform") {
            $latestPlatform = Get-ChildItem "$env:ProgramData\Microsoft\Windows Defender\Platform" -Directory |
              Sort-Object Name -Descending |
              Select-Object -First 1
            if ($latestPlatform) {
              $candidates = @((Join-Path $latestPlatform.FullName "MpCmdRun.exe")) + $candidates
            }
          }

          $mpcmd = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (!$mpcmd) {
            Write-Warning "MpCmdRun.exe not found on this runner; skipping Defender scan"
            exit 0
          }

          & $mpcmd -Scan -ScanType 3 -File "$PWD\build\.native-windows\geyserlite.exe"
          if ($LASTEXITCODE -ne 0) {
            throw "Microsoft Defender scan failed with exit code $LASTEXITCODE"
          }

      - name: Smoke Windows executable
        shell: pwsh
        run: |
          $smoke = New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP/geyserlite-smoke"
          Copy-Item build/.native-windows/geyserlite.exe "$smoke/geyserlite.exe"
          Copy-Item build/.work/Geyser/core/src/main/resources/permissions.yml "$smoke/permissions.yml"

          $stdout = Join-Path $smoke "stdout.log"
          $stderr = Join-Path $smoke "stderr.log"
          $proc = Start-Process `
            -FilePath "$smoke/geyserlite.exe" `
            -ArgumentList "--nogui" `
            -WorkingDirectory $smoke `
            -RedirectStandardOutput $stdout `
            -RedirectStandardError $stderr `
            -PassThru

          try {
            for ($i = 0; $i -lt 90; $i++) {
              $logs = ""
              if (Test-Path $stdout) { $logs += Get-Content $stdout -Raw }
              if (Test-Path $stderr) { $logs += Get-Content $stderr -Raw }
              if ($logs -match "Started Geyser on UDP port") {
                exit 0
              }
              if ($proc.HasExited) {
                throw "geyserlite exited with code $($proc.ExitCode)`n$logs"
              }
              Start-Sleep -Seconds 1
            }
            throw "timed out waiting for Geyser startup"
          } finally {
            if (!$proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
            if (Test-Path $stdout) { Get-Content $stdout }
            if (Test-Path $stderr) { Get-Content $stderr }
          }

      - name: Stage release artifact
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item build/.native-windows/geyserlite.exe artifacts/geyserlite-windows-amd64.exe

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: geyserlite-windows-amd64
          path: artifacts/
          if-no-files-found: error

  # Multi-arch manifest + smoke
  publish-manifest:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compose multi-arch manifest
        run: |
          REF=$(tr -d '[:space:]' < build/geyser.version)
          SHORT="${REF:0:12}"
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT}-arm64

  # End-to-end tests against the just-built artifacts. Each job loads
  # the .so (embedded mode) or spawns the ELF (subprocess mode) and
  # confirms a real RakNet probe → MOTD round-trip succeeds. Catches
  # regressions neither unit tests nor the docker smoke test can see.
  # Common scaffolding (checkout + mise + artifact download + upstream
  # stub) lives in .github/actions/integration-setup.
  go-integration:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/integration-setup
      - name: Run Go library against just-built .so
        env:
          GEYSERLITE_LIBRARY: /tmp/artifacts/libgeyserlite-linux-amd64.so
          LISTEN: 127.0.0.1:19133
          STUB_PGID: ${{ steps.setup.outputs.stub_pgid }}
        # Embedded Go is intermittently flaky on GitHub runners — the
        # purego ↔ GraalVM signal-handler interaction occasionally
        # SIGSEGVs during Geyser bootstrap. Other paths (rust embedded,
        # both subprocess) are stable. Retry up to 3× before failing.
        run: |
          attempt() {
            ( cd go && go run ./cmd/integration-test -listen "$LISTEN" -timeout 90s ) &
            local IT=$!
            local rc=0
            ( cd go && go run ./cmd/bedrock-probe -wait 60s "$LISTEN" ) || rc=$?
            kill -- "-$IT" 2>/dev/null || kill -9 "$IT" 2>/dev/null || true
            wait "$IT" 2>/dev/null || true
            return "$rc"
          }
          for i in 1 2 3; do
            if attempt; then echo "OK on attempt $i"; exit 0; fi
            echo "::warning::go-integration attempt $i failed; retrying"
          done
          exit 1

  go-subprocess-integration:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/integration-setup
      - env:
          GEYSERLITE_BINARY: /tmp/artifacts/geyserlite-linux-amd64
          LISTEN: 127.0.0.1:19135
        run: |
          ( cd go && go run ./cmd/integration-test -listen "$LISTEN" -timeout 90s -mode subprocess ) &
          IT=$!
          trap "kill -- -$IT 2>/dev/null || kill -9 $IT 2>/dev/null || true" EXIT
          cd go && go run ./cmd/bedrock-probe -wait 60s "$LISTEN"

  rust-integration:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/integration-setup
      - env:
          GEYSERLITE_LIBRARY: /tmp/artifacts/libgeyserlite-linux-amd64.so
          LISTEN: 127.0.0.1:19134
        run: |
          ( cd rust && cargo run --example integration_test -- --listen "$LISTEN" --timeout 90 ) &
          IT=$!
          trap "kill -- -$IT 2>/dev/null || kill -9 $IT 2>/dev/null || true" EXIT
          cd go && go run ./cmd/bedrock-probe -wait 60s "$LISTEN"

  rust-subprocess-integration:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/integration-setup
      - env:
          GEYSERLITE_BINARY: /tmp/artifacts/geyserlite-linux-amd64
          LISTEN: 127.0.0.1:19136
        run: |
          ( cd rust && cargo run --example integration_test -- --listen "$LISTEN" --timeout 90 --mode subprocess ) &
          IT=$!
          trap "kill -- -$IT 2>/dev/null || kill -9 $IT 2>/dev/null || true" EXIT
          cd go && go run ./cmd/bedrock-probe -wait 60s "$LISTEN"

  smoke:
    needs: publish-manifest
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - name: Start container
        run: |
          REF=$(tr -d '[:space:]' < build/geyser.version)
          SHORT="${REF:0:12}"
          docker run -d --name geyser -p 19132:19132/udp \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT}
      - name: Probe Bedrock listener (synthetic RakNet client)
        run: |
          # Wait up to 30s for boot + bind, then verify MOTD round-trips.
          go -C go run ./cmd/bedrock-probe -wait=30s 127.0.0.1:19132 || (docker logs geyser; exit 1)
      - name: Tear down
        if: always()
        run: docker rm -f geyser || true
