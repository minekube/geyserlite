name: Release Please

# Closes the auto-sustaining loop.
#
# Renovate auto-merges Geyser bumps into main when CI is green. That
# updates the .so/ELF/container at :latest but doesn't cut a tag, so
# Go-module + crates.io consumers stay frozen on the last manual tag.
#
# This workflow uses google-github-actions/release-please-action to
# parse Conventional Commit messages on main and open a release PR
# that bumps Cargo.toml + the auto-download Default*Version constants
# to the next patch (or minor / major, per the commit prefix). Merging
# the release PR pushes the v* tag, which fans out to:
#   - release.yml: GH Release with cosign-signed artifacts
#   - release.yml: crates.io OIDC Trusted Publishing
#   - release.yml: Gate dependency bump after release assets are uploaded
#   - native-image.yml's :latest tag (already on main; tag is informational)
#
# Conventional Commit prefixes that drive a release:
#   fix:   → patch (0.1.2 → 0.1.3)
#   feat:  → minor (0.1.2 → 0.2.0)
#   feat!: → major (0.1.2 → 1.0.0)
# anything else (chore:, docs:, build:, ci:, refactor:, test:) → no release.
#
# Renovate is configured (renovate.json) to use "fix:" prefixes
# for Geyser bumps so they trip a patch release automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write    # to gh workflow run release.yml
  checks: write     # to mirror release-branch CI onto the required PR check
  statuses: write   # to satisfy branch protection for GITHUB_TOKEN release PRs

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      pr_number: ${{ steps.rp.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          # release-type=simple just tracks the version in version.txt /
          # cargo via release-please-config.json. We use a manifest
          # config so the same release covers both Go and Rust at once.
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      # Pull requests created by GITHUB_TOKEN do not trigger pull_request
      # workflows. Run the same CI workflow on the release branch explicitly,
      # mirror its result to the required lint-test context, merge the validated
      # PR, and dispatch this workflow once more on main so release-please can
      # create the tag. GITHUB_TOKEN-created merges do not fire push workflows.
      - name: Validate release PR
        if: ${{ steps.rp.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(echo '${{ steps.rp.outputs.pr }}' | jq -r '.number')
          PR_JSON=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json headRefName,headRefOid)
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName')
          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')

          echo "Dispatching CI for release PR #$PR_NUMBER at $HEAD_REF ($HEAD_SHA)"
          gh workflow run ci.yml --repo "${{ github.repository }}" --ref "$HEAD_REF"

          RUN_ID=""
          for _ in $(seq 1 60); do
            RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow ci.yml \
              --branch "$HEAD_REF" \
              --event workflow_dispatch \
              --json databaseId,headSha \
              --jq "map(select(.headSha == \"$HEAD_SHA\")) | .[0].databaseId // \"\"")
            if [ -n "$RUN_ID" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::Timed out waiting for dispatched CI run to appear"
            exit 1
          fi

          echo "Waiting for CI run $RUN_ID"
          for _ in $(seq 1 180); do
            RUN_JSON=$(gh run view "$RUN_ID" \
              --repo "${{ github.repository }}" \
              --json status,conclusion,url)
            STATUS=$(echo "$RUN_JSON" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion // ""')
            RUN_URL=$(echo "$RUN_JSON" | jq -r '.url')
            if [ "$STATUS" = "completed" ]; then
              break
            fi
            sleep 10
          done

          if [ "$STATUS" != "completed" ]; then
            echo "::error::Timed out waiting for CI run $RUN_ID"
            exit 1
          fi

          CHECK_CONCLUSION="$CONCLUSION"
          if [ "$CHECK_CONCLUSION" = "cancelled" ]; then
            CHECK_CONCLUSION="neutral"
          fi

          gh api "repos/${{ github.repository }}/check-runs" \
            -f name='lint-test' \
            -f head_sha="$HEAD_SHA" \
            -f status='completed' \
            -f conclusion="$CHECK_CONCLUSION" \
            -f details_url="$RUN_URL" \
            -f output[title]="Release PR CI $CONCLUSION" \
            -f output[summary]="Mirrors workflow_dispatch CI run $RUN_ID for release PR #$PR_NUMBER: $RUN_URL"

          STATUS_STATE="failure"
          if [ "$CONCLUSION" = "success" ]; then
            STATUS_STATE="success"
          fi
          gh api "repos/${{ github.repository }}/statuses/$HEAD_SHA" \
            -f state="$STATUS_STATE" \
            -f context='lint-test' \
            -f target_url="$RUN_URL" \
            -f description="Release PR CI $CONCLUSION via workflow_dispatch"

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Release PR CI concluded $CONCLUSION"
            exit 1
          fi

          echo "Merging release PR #$PR_NUMBER"
          for _ in $(seq 1 30); do
            if gh pr merge "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --merge; then
              break
            fi
            STATE=$(gh pr view "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --json state \
              --jq '.state')
            if [ "$STATE" = "MERGED" ]; then
              break
            fi
            sleep 10
          done

          STATE=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json state \
            --jq '.state')
          if [ "$STATE" != "MERGED" ]; then
            echo "::error::Release PR #$PR_NUMBER did not merge"
            exit 1
          fi

          gh workflow run release-please.yml \
            --repo "${{ github.repository }}" \
            --ref main

  # release-please pushes the v* tag with GITHUB_TOKEN, which by
  # design doesn't fire downstream workflows (GitHub's anti-recursion
  # safeguard). Without this step the v* tag exists but release.yml
  # never runs — empty GH Release, no crates.io publish, no artifacts.
  # Explicitly dispatching release.yml on the freshly-tagged ref
  # closes the loop without needing a PAT.
  trigger-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release.yml on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ needs.release-please.outputs.tag_name }}"
