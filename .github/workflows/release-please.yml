name: Release Please

# Closes the auto-sustaining loop.
#
# Renovate auto-merges Geyser bumps into main when CI is green. That
# updates the .so/ELF/container at :latest but doesn't cut a tag, so
# Go-module + crates.io consumers stay frozen on the last manual tag.
#
# This workflow uses google-github-actions/release-please-action to
# parse Conventional Commit messages on main and open a release PR
# that bumps Cargo.toml + the auto-download Default*Version constants
# to the next patch (or minor / major, per the commit prefix). Merging
# the release PR pushes the v* tag, which fans out to:
#   - release.yml: GH Release with cosign-signed artifacts
#   - release.yml: crates.io OIDC Trusted Publishing
#   - native-image.yml's :latest tag (already on main; tag is informational)
#
# Conventional Commit prefixes that drive a release:
#   fix:   → patch (0.1.2 → 0.1.3)
#   feat:  → minor (0.1.2 → 0.2.0)
#   feat!: → major (0.1.2 → 1.0.0)
# anything else (chore:, docs:, build:, ci:, refactor:, test:) → no release.
#
# Renovate is configured (.github/renovate.json5) to use "fix:" prefixes
# for Geyser bumps so they trip a patch release automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write    # to gh workflow run release.yml

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      pr_number: ${{ steps.rp.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          # release-type=simple just tracks the version in version.txt /
          # cargo via release-please-config.json. We use a manifest
          # config so the same release covers both Go and Rust at once.
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      # Enable PR auto-merge as soon as release-please opens/updates
      # the release PR. Branch-protection rules on main require the
      # `lint-test` check to pass before the merge actually happens, so
      # this is "queue for merge once CI is green" — not "merge now".
      # No human click needed on the happy path.
      - name: Auto-merge release PR
        if: ${{ steps.rp.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(echo '${{ steps.rp.outputs.pr }}' | jq -r '.number')
          echo "Enabling auto-merge on PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --auto \
            --merge

  # release-please pushes the v* tag with GITHUB_TOKEN, which by
  # design doesn't fire downstream workflows (GitHub's anti-recursion
  # safeguard). Without this step the v* tag exists but release.yml
  # never runs — empty GH Release, no crates.io publish, no artifacts.
  # Explicitly dispatching release.yml on the freshly-tagged ref
  # closes the loop without needing a PAT.
  trigger-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release.yml on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ needs.release-please.outputs.tag_name }}"
